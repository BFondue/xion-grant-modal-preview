name: Verify Signed Commits

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  verify-signatures:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check all commits are signed
        uses: actions/github-script@v7
        with:
          script: |
            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100
            });

            const unsigned = commits.data.filter(c => 
              !c.commit.verification || c.commit.verification.verified !== true
            );

            if (unsigned.length > 0) {
              const list = unsigned.map(c => 
                `| \`${c.sha.substring(0, 7)}\` | ${c.commit.message.split('\n')[0].substring(0, 50)} | ${c.commit.verification?.reason || 'unsigned'} |`
              ).join('\n');
              
              const body = `## ❌ Unsigned Commits Detected

            This PR contains **${unsigned.length} unsigned commit(s)** and has been automatically closed.

            | Commit | Message | Reason |
            |--------|---------|--------|
            ${list}

            ### How to fix

            1. **Set up commit signing:** [GitHub Docs](https://docs.github.com/en/authentication/managing-commit-signature-verification/signing-commits)

            2. **Re-sign your commits:**
               \`\`\`bash
               # Rebase and re-sign all commits in this branch
               git rebase --exec 'git commit --amend --no-edit -S' origin/testnet
               git push --force-with-lease
               \`\`\`

            3. **Re-open this PR** after all commits are signed.

            ---
            *All commits must be signed to maintain code integrity and traceability.*`;

              // Add comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });

              // Close the PR
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                state: 'closed'
              });

              core.setFailed(`Closed PR: ${unsigned.length} unsigned commit(s) detected`);
            } else {
              console.log(`✅ All ${commits.data.length} commit(s) are signed`);
            }
