name: Build and Preview

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Deployment environment (testnet or mainnet)"
      message:
        required: true
        type: string
        description: "Version/upload message for the preview build"
    outputs:
      deployment-url:
        description: "The preview deployment URL"
        value: ${{ jobs.preview.outputs.deployment-url }}

jobs:
  preview:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.extract-url.outputs.deployment-url }}
    permissions:
      contents: read
      deployments: write
    outputs:
      deployment-url: ${{ steps.extract-url.outputs.deployment-url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm exec vite build --mode ${{ inputs.environment }}
        env:
          CLOUDFLARE_ENV: ${{ inputs.environment }}
          VITE_NETWORK: ${{ inputs.environment }}
          VITE_APP_VERSION: ${{ inputs.message }}
          VITE_STYTCH_PUBLIC_TOKEN: ${{ secrets.VITE_STYTCH_PUBLIC_TOKEN || secrets.VITE_DEFAULT_STYTCH_PUBLIC_TOKEN }}
          VITE_NUMIA_TOKEN: ${{ secrets.VITE_NUMIA_TOKEN }}

      - name: Upload preview version
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.BURNT_CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.BURNT_CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --env=${{ inputs.environment }} --message="${{ inputs.message }}"
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          environment: ${{ inputs.environment }}
          packageManager: pnpm

      - name: Extract deployment URL
        id: extract-url
        env:
          OUTPUT: ${{ steps.deploy.outputs.command-output }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          if [[ "$ENVIRONMENT" == "mainnet" ]]; then
            WORKER_NAME="xion-dashboard"
          else
            WORKER_NAME="xion-dashboard-testnet"
          fi

          VERSION_ID=$(echo "$OUTPUT" | grep -oE 'Worker Version ID: [a-f0-9-]+' | cut -d' ' -f4 | head -1 || true)

          if [ -n "$VERSION_ID" ]; then
            SHORT_VERSION_ID=$(echo "$VERSION_ID" | cut -d'-' -f1)
            URL="https://${SHORT_VERSION_ID}-${WORKER_NAME}.burnt.workers.dev"
          elif echo "$OUTPUT" | grep -qE 'https://[^ ]+\.workers\.dev'; then
            URL=$(echo "$OUTPUT" | grep -oE 'https://[^ ]+\.workers\.dev' | head -1)
          else
            URL="https://${WORKER_NAME}.burnt.workers.dev"
          fi

          echo "deployment-url=$URL" >> $GITHUB_OUTPUT
          echo "### 🚀 Preview deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Message:** ${{ inputs.message }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** $URL" >> $GITHUB_STEP_SUMMARY

  comment:
    needs: preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Comment preview URL
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ needs.preview.outputs.deployment-url }}
          ENVIRONMENT: ${{ inputs.environment }}
          MESSAGE: ${{ inputs.message }}
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            const env = process.env.ENVIRONMENT;
            const message = process.env.MESSAGE;
            const sha = context.sha.substring(0, 7);
            const now = new Date().toISOString().replace('T', ' ').substring(0, 16) + ' UTC';
            const repoUrl = context.payload.repository.html_url;
            const workerName = env === 'mainnet' ? 'xion-dashboard' : 'xion-dashboard-testnet';
            const marker = `Deploying with \uD83D\uDD36 Cloudflare Workers (${env})`;

            const body = [
              `## ${marker}`,
              '',
              `**${message}**`,
              '',
              '| Status | Name | Latest Commit | Updated (UTC) |',
              '|--------|------|---------------|---------------|',
              `| \u2705 Preview ready!<br>[View preview](${url}) | ${workerName} | [${sha}](${repoUrl}/commit/${context.sha}) | ${now} |`
            ].join('\n');

            // Try to find a PR to comment on
            let prNumber = context.payload.pull_request?.number;

            if (!prNumber && context.payload.release?.tag_name) {
              // For releases, find the most recent merged PR matching this tag
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'all',
                sort: 'updated',
                direction: 'desc',
                per_page: 10,
              });
              const tagName = context.payload.release.tag_name;
              const matched = prs.find(pr => pr.title.includes(tagName) || pr.head.ref.includes(tagName));
              if (matched) {
                prNumber = matched.number;
              }
            }

            if (!prNumber) {
              core.info('No PR context — skipping comment');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id
              });
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            });

