# This workflow will release the packages with Changesets

name: 🚀 Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        id: checkout
        uses: actions/checkout@v2.3.3
        with:
          token: ${{ env.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: false

      - name: 🟢 Setup node
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: 🧩 Install Dependencies
        id: install-dependencies
        run: npm install

      - name: 🏗️ Build
        id: build-the-repo
        run: npm run build

      - name: Load SSH signing key
        run: |
          echo "${{ secrets.SSH_SIGNING_PK }}" > /tmp/.git_signing_key
          chmod 600 /tmp/.git_signing_key
        shell: bash

      - name: Set git user
        shell: bash
        run: |
          git config user.name "isburnt"
          git config user.email "197779235+isburnt@users.noreply.github.com"
          git config commit.gpgsign true
          git config gpg.format ssh
          git config user.signingkey /tmp/.git_signing_key

      - name: 📣 Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          title: "chore(release): version packages 🦋"
          publish: npm run publish:packages
          version: npm run version:packages
          commit: "chore: update versions"
          setupGitUser: false
        env:
          GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
