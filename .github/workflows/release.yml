# This workflow will release the packages with Changesets

name: 🚀 Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  HUSKY: 0

jobs:
  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          token: ${{ env.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: false

      - name: 🟢 Setup node
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: 🧩 Install Dependencies
        id: install-dependencies
        run: npm ci

      - name: 🔍 Validate Dependencies
        id: validate-deps
        run: |
          echo "Checking for file: protocol dependencies..."
          if grep -q '"file:' package.json; then
            echo "❌ Error: Cannot release with file: protocol dependencies"
            exit 1
          fi
          echo "✅ No file: protocol dependencies"

      - name: 🏗️ Build
        id: build-the-repo
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          VITE_STYTCH_PUBLIC_TOKEN: ${{ secrets.STYTCH_TESTNET_PUBLIC_TOKEN || 'dummy-token' }}
          VITE_NUMIA_TOKEN: ${{ secrets.NUMIA_TOKEN || 'dummy-token' }}

      - name: Load SSH signing key
        run: |
          echo "${{ secrets.SSH_SIGNING_PK }}" > /tmp/.git_signing_key
          chmod 600 /tmp/.git_signing_key
        shell: bash

      - name: Set git user
        shell: bash
        run: |
          git config user.name "isburnt"
          git config user.email "197779235+isburnt@users.noreply.github.com"
          git config commit.gpgsign true
          git config gpg.format ssh
          git config user.signingkey /tmp/.git_signing_key

      - name: 📣 Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          title: "chore(release): version packages 🦋"
          publish: npm run publish:packages
          version: npm run version:packages
          commit: "chore: update versions"
          setupGitUser: false
        env:
          GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
