name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Set environment variables
        run: |
          echo "CLOUDFLARE_ENV=testnet-beta" >> $GITHUB_ENV
          echo "VITE_STYTCH_PUBLIC_TOKEN=dummy-token-for-tests" >> $GITHUB_ENV
          echo "VITE_NUMIA_TOKEN=dummy-numia-token" >> $GITHUB_ENV
          echo "VITE_NETWORK=testnet" >> $GITHUB_ENV

      - name: Run tests with coverage
        run: npm run test:coverage
