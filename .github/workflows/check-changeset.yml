name: Check for Changesets

on:
  pull_request:
    paths:
      - '**/*'

jobs:
  changesets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm ci

      - name: Check for Changeset
        uses: changesets/action@v2
        with:
          check: true
