name: Build and Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Deployment environment (testnet, mainnet)"
      wrangler-command:
        required: true
        type: string
        description: "Wrangler command (deploy or versions upload)"
      build-mode:
        required: false
        type: string
        default: ""
        description: "Vite build mode (defaults to environment name)"
      message:
        required: false
        type: string
        default: ""
        description: "Version message for versions upload"
    outputs:
      deployment-url:
        description: "The deployment URL"
        value: ${{ jobs.build-deploy.outputs.deployment-url }}

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      deployments: write
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm exec vite build --mode ${{ inputs.build-mode || inputs.environment }}
        env:
          # Cloudflare environment
          CLOUDFLARE_ENV: ${{ inputs.environment }}
          # Release version
          VITE_APP_VERSION: ${{ inputs.message || github.sha }}
          # Secrets
          VITE_STYTCH_PUBLIC_TOKEN: ${{ secrets.VITE_STYTCH_PUBLIC_TOKEN || secrets.VITE_DEFAULT_STYTCH_PUBLIC_TOKEN }}
          VITE_NUMIA_TOKEN: ${{ secrets.VITE_NUMIA_TOKEN }}
          # Network & API configuration
          VITE_NETWORK: ${{ vars.VITE_NETWORK }}
          VITE_CHAIN_ID: ${{ vars.VITE_CHAIN_ID }}
          VITE_XION_RPC_URL: ${{ vars.VITE_XION_RPC_URL }}
          VITE_ABSTRAXION_API_URL: ${{ vars.VITE_ABSTRAXION_API_URL }}
          VITE_XION_STYTCH_API: ${{ vars.VITE_XION_STYTCH_API }}
          VITE_DEFAULT_INDEXER_URL: ${{ vars.VITE_DEFAULT_INDEXER_URL }}
          VITE_INDEXER_STRATEGY: ${{ vars.VITE_INDEXER_STRATEGY }}
          VITE_NUMIA_URL: ${{ vars.VITE_NUMIA_URL }}
          # Account configuration
          VITE_DEFAULT_ACCOUNT_CONTRACT_CODE_ID: ${{ vars.VITE_DEFAULT_ACCOUNT_CONTRACT_CODE_ID }}
          VITE_FEE_GRANTER_ADDRESS: ${{ vars.VITE_FEE_GRANTER_ADDRESS }}
          VITE_GAS_ADJUSTMENT: ${{ vars.VITE_GAS_ADJUSTMENT }}
          VITE_GAS_MARGIN: ${{ vars.VITE_GAS_MARGIN }}
          # Feature flags
          VITE_KEPLR_FLAG: ${{ vars.VITE_KEPLR_FLAG }}
          VITE_METAMASK_FLAG: ${{ vars.VITE_METAMASK_FLAG }}
          VITE_OKX_FLAG: ${{ vars.VITE_OKX_FLAG }}
          VITE_PASSKEY_FLAG: ${{ vars.VITE_PASSKEY_FLAG }}
          VITE_APPLE_FLAG: ${{ vars.VITE_APPLE_FLAG }}

      - name: Deploy to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.BURNT_CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.BURNT_CLOUDFLARE_ACCOUNT_ID }}
          command: ${{ inputs.wrangler-command }} --env=${{ inputs.environment }}${{ inputs.message && format(' --message="{0}"', inputs.message) || '' }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          packageManager: pnpm

      - name: Extract deployment URL
        id: extract-url
        env:
          OUTPUT: ${{ steps.deploy.outputs.command-output }}
          VERSION: ${{ inputs.message }}
        run: |
          ENV="${{ inputs.environment }}"

          # Try to extract Version ID for preview URLs
          VERSION_ID=$(echo "$OUTPUT" | grep -oE 'Worker Version ID: [a-f0-9-]+' | cut -d' ' -f4 | head -1 || true)

          if [ -n "$VERSION_ID" ]; then
            # Preview URL format: https://<version-id>-<worker-name>.<subdomain>.workers.dev
            URL="https://${VERSION_ID}-xion-dashboard-${ENV}.burnt-labs.workers.dev"
          elif echo "$OUTPUT" | grep -qE 'https://[^ ]+\.workers\.dev'; then
            URL=$(echo "$OUTPUT" | grep -oE 'https://[^ ]+\.workers\.dev' | head -1)
          else
            # Fallback to custom domain
            if [[ "$ENV" == "mainnet" ]]; then
              URL="https://settings.burnt.com"
            else
              URL="https://settings.testnet.burnt.com"
            fi
          fi

          echo "deployment-url=$URL" >> $GITHUB_OUTPUT
          echo "### 🚀 Deployed to ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "$VERSION" ]; then
            echo "**Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**URL:** $URL" >> $GITHUB_STEP_SUMMARY
