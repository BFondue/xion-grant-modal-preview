<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />

  <title>Abstraxion Settings</title>
  <script type="module">
    // Load polyfills before anything else
    import { Buffer } from 'buffer';
    import process from 'process';

    window.Buffer = Buffer;
    window.process = process;
    window.global = window;

    console.log('[Polyfills] Buffer, process, and global loaded');
  </script>
  <style>
    /* Make body transparent by default for iframe mode - modals will have their own backgrounds */
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Detect standalone mode and apply dark background */
    body.standalone {
      background: hsl(0, 0%, 7%);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/iframe.tsx"></script>
</body>

</html>
